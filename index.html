<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Violência Contra a Mulher - Contador</title>
    <style>
        /* ----- RESET E BASE MINIMALISTA ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #111111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            padding: 20px;
        }

        /* CRONÔMETRO - EM CIMA */
        .cronometro-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .cronometro-numero {
            font-size: 4rem;
            font-weight: 400;
            color: #1a1a1a;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            font-family: 'Inter', 'Courier New', monospace;
        }

        .cronometro-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #bbbbbb;
            font-weight: 500;
            margin-top: 2px;
        }

        /* CONTADOR PRINCIPAL - EMBAIXO (MAIOR) */
        .contador-numero {
            font-size: 12rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #1a1a1a;
            transition: color 0.08s ease;
            font-variant-numeric: tabular-nums;
            margin: 10px 0 20px 0;
        }

        /* PISCADA VERMELHA */
        .contador-numero.piscar {
            color: #d0312d !important;
            transition: color 0s;
        }

        /* ESTATÍSTICAS ABAIXO */
        .estatisticas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 40px;
            margin: 10px 0 40px 0;
        }

        .estatistica-item {
            font-size: 1rem;
            font-weight: 400;
            color: #555555;
            letter-spacing: 0.3px;
        }

        .estatistica-item strong {
            font-weight: 700;
            color: #1a1a1a;
        }

        .estatistica-item .vermelho {
            color: #d0312d;
            font-weight: 700;
        }

        /* RODAPÉ */
        .footer {
            border-top: 1px solid #f0f0f0;
            padding-top: 28px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #aaaaaa;
            letter-spacing: 0.5px;
        }

        .footer strong {
            color: #777777;
            font-weight: 500;
        }

        /* RESPONSIVO */
        @media (max-width: 800px) {
            .cronometro-numero {
                font-size: 3rem;
            }
            .contador-numero {
                font-size: 7rem;
            }
            .estatisticas {
                flex-direction: column;
                gap: 6px;
            }
            .estatistica-item {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 500px) {
            .cronometro-numero {
                font-size: 2.2rem;
            }
            .contador-numero {
                font-size: 4.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- CRONÔMETRO (EM CIMA) -->
    <div class="cronometro-wrapper">
        <span class="cronometro-numero" id="cronometro">00:00:00</span>
        <span class="cronometro-label">cronômetro</span>
    </div>

    <!-- CONTADOR (EMBAIXO) -->
    <div class="contador-numero" id="contador">1</div>

    <!-- ESTATÍSTICAS -->
    <div class="estatisticas">
        <span class="estatistica-item">
            <strong id="projecaoDia">0</strong> violências até hoje
        </span>
        <span class="estatistica-item">
            <strong class="vermelho" id="feminicidiosDia">0</strong> feminicídios até hoje
        </span>
        <span class="estatistica-item">
            <strong>4</strong> por dia
        </span>
    </div>

    <!-- RODAPÉ -->
    <div class="footer">
        <strong>Dados:</strong> Fórum Brasileiro de Segurança Pública
    </div>

</div>

<script>
    (function() {
        "use strict";

        // ----- ELEMENTOS -----
        const cronometroEl = document.getElementById('cronometro');
        const contadorEl = document.getElementById('contador');
        const projecaoEl = document.getElementById('projecaoDia');
        const feminicidiosEl = document.getElementById('feminicidiosDia');

        // ----- CONFIGURAÇÕES -----
        const INTERVALO_SEGUNDOS = 15;
        const SEGUNDOS_POR_DIA = 86400;
        const FEMINICIDIOS_POR_DIA = 4;

        let contador = 1;
        let cronometroMs = 0;
        let ultimoTimestamp = 0;
        let cronometroRodando = false;
        let animacaoId = null;
        let ultimoReset = 0;

        // ----- ÁUDIO (beep) -----
        let audioCtx = null;

        function playBeep() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.value = 0.08;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (_) { /* silencioso */ }
        }

        // ----- FORMATA CRONÔMETRO (HH:MM:SS) -----
        function formatarCronometro(ms) {
            const totalSegundos = Math.floor(ms / 1000);
            const horas = Math.floor(totalSegundos / 3600);
            const minutos = Math.floor((totalSegundos % 3600) / 60);
            const segundos = totalSegundos % 60;

            const pad = (n, d) => String(n).padStart(d, '0');
            return `${pad(horas, 2)}:${pad(minutos, 2)}:${pad(segundos, 2)}`;
        }

        // ----- ATUALIZA CRONÔMETRO (requestAnimationFrame) -----
        function atualizarCronometro(timestamp) {
            if (!cronometroRodando) {
                animacaoId = null;
                return;
            }

            if (ultimoTimestamp === 0) {
                ultimoTimestamp = timestamp;
                animacaoId = requestAnimationFrame(atualizarCronometro);
                return;
            }

            const delta = timestamp - ultimoTimestamp;
            ultimoTimestamp = timestamp;

            cronometroMs += delta;

            // Verifica se passou 15 segundos (15000 ms) desde o último incremento
            if (cronometroMs - ultimoReset >= INTERVALO_SEGUNDOS * 1000) {
                // Atualiza o contador de violências
                contador += 1;
                contadorEl.textContent = contador;

                // Pisca vermelho
                contadorEl.classList.add('piscar');
                setTimeout(() => {
                    contadorEl.classList.remove('piscar');
                }, 250);

                playBeep();
                atualizarProjecoes();

                // Marca o momento do último incremento
                ultimoReset = cronometroMs;
            }

            // Atualiza display do cronômetro (apenas a cada 1s para não pesar)
            const segundosAtuais = Math.floor(cronometroMs / 1000);
            const segundosAnteriores = Math.floor((cronometroMs - delta) / 1000);
            if (segundosAtuais !== segundosAnteriores) {
                cronometroEl.textContent = formatarCronometro(cronometroMs);
            }

            animacaoId = requestAnimationFrame(atualizarCronometro);
        }

        // ----- INICIA CRONÔMETRO AUTOMATICAMENTE -----
        function iniciarCronometro() {
            if (cronometroRodando) return;
            cronometroRodando = true;
            ultimoTimestamp = 0;
            ultimoReset = 0;
            if (animacaoId === null) {
                animacaoId = requestAnimationFrame(atualizarCronometro);
            }
        }

        // ----- ATUALIZA ESTATÍSTICAS -----
        function atualizarProjecoes() {
            const agora = new Date();
            const segundosPassadosHoje = (agora.getHours() * 3600) + (agora.getMinutes() * 60) + agora.getSeconds();
            const segundosRestantesDia = SEGUNDOS_POR_DIA - segundosPassadosHoje;

            // Violências (a cada 15s)
            const violenciasRestantes = Math.floor(segundosRestantesDia / INTERVALO_SEGUNDOS);
            const projecaoTotal = contador + violenciasRestantes;
            projecaoEl.textContent = projecaoTotal.toLocaleString('pt-BR');

            // Feminicídios: 4 por dia
            const feminicidiosAteAgora = Math.floor((segundosPassadosHoje / SEGUNDOS_POR_DIA) * FEMINICIDIOS_POR_DIA);
            const feminicidiosRestantes = Math.floor((segundosRestantesDia / SEGUNDOS_POR_DIA) * FEMINICIDIOS_POR_DIA);
            const totalFeminicidios = feminicidiosAteAgora + feminicidiosRestantes;
            feminicidiosEl.textContent = totalFeminicidios;
        }

        // ----- INICIALIZAÇÃO -----
        function iniciar() {
            contadorEl.textContent = contador;
            cronometroMs = 0;
            ultimoReset = 0;
            cronometroEl.textContent = formatarCronometro(0);
            atualizarProjecoes();

            // Inicia o cronômetro automaticamente
            iniciarCronometro();

            // Ativa áudio no primeiro clique
            document.addEventListener('click', function ativarAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 600;
                    osc.type = 'sine';
                    gain.gain.value = 0.04;
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.08);
                } catch (_) {}
                document.removeEventListener('click', ativarAudio);
            });

            // Atualiza projeções a cada minuto
            setInterval(atualizarProjecoes, 60000);
        }

        iniciar();

    })();
</script>

</body>
</html>
