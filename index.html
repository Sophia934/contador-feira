<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Violência Contra a Mulher - Contador</title>
    <style>
        /* ----- RESET E BASE MINIMALISTA ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #111111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .container {
            max-width: 820px;
            width: 100%;
            text-align: center;
            padding: 20px;
        }

        /* CONTADOR PRINCIPAL - GIGANTE */
        .numero-principal {
            font-size: 12rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #1a1a1a;
            transition: color 0.08s ease;
            font-variant-numeric: tabular-nums;
            margin-bottom: 12px;
        }

        /* PISCADA VERMELHA */
        .numero-principal.piscar {
            color: #d0312d !important;
            transition: color 0s;
        }

        /* ESTATÍSTICAS ABAIXO DO NÚMERO */
        .estatisticas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 40px;
            margin: 8px 0 40px 0;
        }

        .estatistica-item {
            font-size: 1rem;
            font-weight: 400;
            color: #555555;
            letter-spacing: 0.3px;
        }

        .estatistica-item strong {
            font-weight: 700;
            color: #1a1a1a;
        }

        .estatistica-item .vermelho {
            color: #d0312d;
            font-weight: 700;
        }

        /* RODAPÉ */
        .footer {
            border-top: 1px solid #f0f0f0;
            padding-top: 28px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #aaaaaa;
            letter-spacing: 0.5px;
        }

        .footer strong {
            color: #777777;
            font-weight: 500;
        }

        /* RESPONSIVO */
        @media (max-width: 600px) {
            .numero-principal {
                font-size: 6rem;
            }
            .estatisticas {
                flex-direction: column;
                gap: 6px;
            }
            .estatistica-item {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .numero-principal {
                font-size: 4.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- CONTADOR -->
    <div class="numero-principal" id="contador">0</div>

    <!-- ESTATÍSTICAS -->
    <div class="estatisticas">
        <span class="estatistica-item">
            <strong id="projecaoDia">0</strong> violências até hoje
        </span>
        <span class="estatistica-item">
            <strong class="vermelho" id="feminicidiosDia">0</strong> feminicídios até hoje
        </span>
        <span class="estatistica-item">
            1 a cada <strong>5h25</strong>
        </span>
    </div>

    <!-- RODAPÉ -->
    <div class="footer">
        <strong>Dados:</strong> Fórum Brasileiro de Segurança Pública
    </div>

</div>

<script>
    (function() {
        "use strict";

        // ----- ELEMENTOS -----
        const contadorEl = document.getElementById('contador');
        const projecaoEl = document.getElementById('projecaoDia');
        const feminicidiosEl = document.getElementById('feminicidiosDia');

        // ----- CONFIGURAÇÕES -----
        const INTERVALO_SEGUNDOS = 15;
        const SEGUNDOS_POR_DIA = 86400;
        const VIOLENCIAS_POR_DIA = Math.floor(SEGUNDOS_POR_DIA / INTERVALO_SEGUNDOS);

        // Feminicídio: 1 a cada 5h25 = 19500 segundos
        const SEGUNDOS_FEMINICIDIO = 5 * 3600 + 25 * 60;
        const FEMINICIDIOS_POR_DIA = SEGUNDOS_POR_DIA / SEGUNDOS_FEMINICIDIO;

        let contador = 0;

        // ----- ÁUDIO (beep) -----
        let audioCtx = null;

        function playBeep() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.value = 0.08;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (_) { /* silencioso */ }
        }

        // ----- ATUALIZA CONTADOR -----
        function atualizarContador() {
            contador += 1;
            contadorEl.textContent = contador;

            // Pisca vermelho
            contadorEl.classList.add('piscar');
            setTimeout(() => {
                contadorEl.classList.remove('piscar');
            }, 250);

            playBeep();
            atualizarProjecoes();
        }

        // ----- ATUALIZA ESTATÍSTICAS -----
        function atualizarProjecoes() {
            const agora = new Date();
            const segundosPassadosHoje = (agora.getHours() * 3600) + (agora.getMinutes() * 60) + agora.getSeconds();
            const segundosRestantes = SEGUNDOS_POR_DIA - segundosPassadosHoje;

            // Violências
            const violenciasRestantes = Math.floor(segundosRestantes / INTERVALO_SEGUNDOS);
            const projecaoTotal = contador + violenciasRestantes;
            projecaoEl.textContent = projecaoTotal.toLocaleString('pt-BR');

            // Feminicídios (sem casa decimal)
            const feminicidiosAteAgora = Math.floor(segundosPassadosHoje / SEGUNDOS_FEMINICIDIO);
            const feminicidiosRestantes = Math.floor(segundosRestantes / SEGUNDOS_FEMINICIDIO);
            const totalFeminicidios = feminicidiosAteAgora + feminicidiosRestantes;
            feminicidiosEl.textContent = totalFeminicidios;
        }

        // ----- INICIALIZAÇÃO -----
        function iniciar() {
            contador = 1;
            contadorEl.textContent = contador;
            atualizarProjecoes();

            // Ativa áudio no primeiro clique
            document.addEventListener('click', function ativarAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 600;
                    osc.type = 'sine';
                    gain.gain.value = 0.04;
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.08);
                } catch (_) {}
                document.removeEventListener('click', ativarAudio);
            });

            setInterval(atualizarContador, INTERVALO_SEGUNDOS * 1000);
            setInterval(atualizarProjecoes, 60000);
        }

        iniciar();

    })();
</script>

</body>
</html>
